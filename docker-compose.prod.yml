# =============================================================================
# Baby Planet BD — Production Docker Compose
# -----------------------------------------------------------------------------
# Stacks: NGINX (TLS termination + reverse proxy) → Next.js frontend + Express
# backend → PostgreSQL + Redis.
#
# Designed for DigitalOcean / Hostinger VPS deployment.
#
# Usage:
#   1. Copy .env.production.example to .env.production and fill in real secrets
#   2. Obtain SSL certs: docker compose -f docker-compose.prod.yml run certbot certonly
#   3. docker compose -f docker-compose.prod.yml up -d
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # NGINX — reverse proxy + TLS termination + Gzip/Brotli + caching
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: babyplanet_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - babyplanet_prod_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Next.js Frontend (standalone)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babyplanet_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: https://api.babyplanet-bd.com
      NEXT_PUBLIC_SITE_URL: https://babyplanet-bd.com
    env_file:
      - .env.production
    expose:
      - "3000"
    networks:
      - babyplanet_prod_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Express Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: babyplanet_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
    env_file:
      - .env.production
    expose:
      - "4000"
    networks:
      - babyplanet_prod_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: babyplanet_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - babyplanet_prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Do NOT expose the DB port to the internet in production
    expose:
      - "5432"

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: babyplanet_redis_prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - babyplanet_prod_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  # ---------------------------------------------------------------------------
  # Certbot — Let's Encrypt SSL certificate automation
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: babyplanet_certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done;"
    networks:
      - babyplanet_prod_net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  nginx_cache:
  certbot_certs:
  certbot_webroot:

# =============================================================================
# Networks
# =============================================================================
networks:
  babyplanet_prod_net:
    driver: bridge
