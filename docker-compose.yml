# =============================================================================
# Baby Planet BD Clone — Production-Ready Docker Compose
# Stack: PostgreSQL 16 + Redis 7 + Adminer (DB UI) + Redis Insight (optional)
# Optimized for DigitalOcean / Hostinger VPS deployment
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary relational database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: babyplanet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-babyplanet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-babyplanet_secret}
      POSTGRES_DB: ${POSTGRES_DB:-babyplanet_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-babyplanet} -d ${POSTGRES_DB:-babyplanet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - babyplanet_net

  # ---------------------------------------------------------------------------
  # Redis 7 — Session cache, rate limiting, product/category cache layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: babyplanet_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-babyplanet_redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-babyplanet_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - babyplanet_net

  # ---------------------------------------------------------------------------
  # Adminer — Lightweight web UI for inspecting PostgreSQL
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: babyplanet_adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - babyplanet_net

  # ---------------------------------------------------------------------------
  # Redis Insight (optional) — GUI for inspecting Redis cache
  # ---------------------------------------------------------------------------
  redisinsight:
    image: redis/redisinsight:latest
    container_name: babyplanet_redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    volumes:
      - redisinsight_data:/data
    networks:
      - babyplanet_net

# =============================================================================
# Persistent volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local

# =============================================================================
# Internal network — services can talk to each other by container name
# =============================================================================
networks:
  babyplanet_net:
    driver: bridge
