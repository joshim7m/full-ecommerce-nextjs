# =============================================================================
# Baby Planet BD — NGINX Reverse Proxy Configuration
# -----------------------------------------------------------------------------
# Production-ready NGINX config for DigitalOcean / Hostinger VPS.
# Routes traffic to:
#   • Frontend  — Next.js standalone on port 3000 (upstream: nextjs)
#   • Backend   — Express API on port 4000 (upstream: backend)
#   • Static    — served directly by NGINX (images, fonts, sitemap, robots)
#
# Features:
#   • Gzip + Brotli compression
#   • HTTP/2 with SSL (Let's Encrypt via Certbot)
#   • Upstream caching for API GET requests
#   • Rate limiting per IP
#   • Security headers (HSTS, CSP, X-Frame-Options, etc.)
#   • Long-cache headers for static assets
#   • WebSocket support (for Socket.io in Phase 5)
#   • Brotli module required (nginx_modules_brotli)
# =============================================================================

# -----------------------------------------------------------------------------
# Upstream definitions
# -----------------------------------------------------------------------------
upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream backend_upstream {
    server 127.0.0.1:4000;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# Rate limiting zones
# -----------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=checkout:10m rate=1r/s;

# -----------------------------------------------------------------------------
# Connection upgrade map (WebSocket support)
# -----------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# -----------------------------------------------------------------------------
# Cache zones
# -----------------------------------------------------------------------------
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:50m max_size=500m inactive=10m use_temp_path=off;
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m max_size=1g inactive=60m use_temp_path=off;

# =============================================================================
# HTTP → HTTPS redirect (port 80)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name babyplanet-bd.com www.babyplanet-bd.com api.babyplanet-bd.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS — Main storefront + API (port 443)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name babyplanet-bd.com www.babyplanet-bd.com;

    # ---- SSL certificates (Let's Encrypt) ----
    ssl_certificate     /etc/letsencrypt/live/babyplanet-bd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babyplanet-bd.com/privkey.pem;

    # ---- SSL hardening (Mozilla intermediate compatibility) ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    # CSP — adjust if using nonces; this is the strict baseline
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' https:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ---- www → non-www redirect ----
    if ($host = www.babyplanet-bd.com) {
        return 301 https://babyplanet-bd.com$request_uri;
    }

    # ---- Root directory for static fallbacks ----
    root /var/www/babyplanet/public;

    # ---- Gzip compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2
        application/wasm;

    # ---- Brotli compression (requires ngx_brotli module) ----
    brotli on;
    brotli_comp_level 6;
    brotli_buffers 16 8k;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ---- Client body limits (file uploads) ----
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ---- Default rate limit ----
    limit_req zone=general burst=60 nodelay;

    # =========================================================================
    # Static assets — served directly by NGINX (bypass Next.js)
    # =========================================================================
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache static_cache;
        proxy_cache_valid 200 1y;
        proxy_cache_use_stale error timeout updating;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache static_cache;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(?:jpg|jpeg|png|gif|ico|webp|avif|svg|css|js|woff|woff2|ttf|eot|otf|wasm)$ {
        proxy_pass http://nextjs_upstream;
        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout updating;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
    }

    # =========================================================================
    # Next.js optimized images — cache at edge
    # =========================================================================
    location /_next/image {
        proxy_pass http://nextjs_upstream;
        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout updating;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
    }

    # =========================================================================
    # SEO files — sitemap, robots, manifest
    # =========================================================================
    location = /robots.txt {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    location = /sitemap.xml {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/xml; charset=utf-8";
        access_log off;
    }

    location = /manifest.webmanifest {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/manifest+json; charset=utf-8";
        access_log off;
    }

    # =========================================================================
    # API routes — proxy to backend with rate limiting + caching
    # =========================================================================
    location /api/ {
        # Strip /api prefix? No — backend already expects it
        proxy_pass http://backend_upstream;

        # Rate limit — 10 r/s with burst
        limit_req zone=api burst=20 nodelay;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Connection pooling
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Cache GET requests (only 200 OK, for 5 minutes)
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_bypass $http_authorization $cookie_bp_token;
        proxy_no_cache $http_authorization $cookie_bp_token;

        # Add cached indicator header
        add_header X-Cache-Status $upstream_cache_status;
    }

    # =========================================================================
    # Auth routes — stricter rate limit (2 r/s)
    # =========================================================================
    location /api/v1/auth/ {
        proxy_pass http://backend_upstream;

        limit_req zone=auth burst=5 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # NEVER cache auth responses
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # =========================================================================
    # Checkout — strictest rate limit (1 r/s) to prevent abuse
    # =========================================================================
    location /api/v1/orders {
        proxy_pass http://backend_upstream;

        limit_req zone=checkout burst=3 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Never cache POST / PATCH / DELETE
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # =========================================================================
    # WebSocket (Socket.io) — for real-time admin dashboard
    # =========================================================================
    location /socket.io/ {
        proxy_pass http://backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # Admin panel — block crawlers via X-Robots-Tag
    # =========================================================================
    location /admin {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Block indexing
        add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # =========================================================================
    # Everything else — proxy to Next.js
    # =========================================================================
    location / {
        proxy_pass http://nextjs_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Don't cache HTML — Next.js handles ISR caching
        add_header X-Frame-Options "DENY" always;
    }

    # =========================================================================
    # Health check endpoint (for Docker / load balancer)
    # =========================================================================
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # =========================================================================
    # Error pages
    # =========================================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Hide nginx version
    server_tokens off;

    # Log formats
    access_log /var/log/nginx/babyplanet_access.log;
    error_log  /var/log/nginx/babyplanet_error.log warn;
}

# =============================================================================
# HTTPS — API subdomain (api.babyplanet-bd.com) — backend only
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.babyplanet-bd.com;

    ssl_certificate     /etc/letsencrypt/live/babyplanet-bd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babyplanet-bd.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # CORS — allow storefront origin
    add_header Access-Control-Allow-Origin "https://babyplanet-bd.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    # Handle preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Default rate limit
    limit_req zone=general burst=60 nodelay;

    # All traffic → backend
    location / {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Stricter rate limit on auth
    location /v1/auth/ {
        proxy_pass http://backend_upstream;
        limit_req zone=auth burst=5 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    server_tokens off;
    access_log /var/log/nginx/babyplanet_api_access.log;
    error_log  /var/log/nginx/babyplanet_api_error.log warn;
}
